name: MSBuild

on:
  workflow_dispatch:

env:
  # Path to the solution file relative to the root of the project.
  SOLUTION_FILE_PATH: .

  # Configuration type to build.
  # You can convert this to a build matrix if you need coverage of multiple configuration types.
  # https://docs.github.com/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
  BUILD_CONFIGURATION: Release

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2025-vs2026

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Cache vcpkg downloads
      uses: actions/cache@v4
      with:
        path: ${{ runner.temp }}\vcpkg_downloads
        key: vcpkg-downloads-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          vcpkg-downloads-${{ runner.os }}-

    - name: Cache vcpkg binary cache
      uses: actions/cache@v4
      with:
        path: ${{ runner.temp }}\vcpkg_archives
        key: vcpkg-archives-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          vcpkg-archives-${{ runner.os }}-

    - name: Setup vcpkg
      run: |
        if not exist "%RUNNER_TEMP%\vcpkg_archives" mkdir "%RUNNER_TEMP%\vcpkg_archives"
        if not exist "%RUNNER_TEMP%\vcpkg_downloads" mkdir "%RUNNER_TEMP%\vcpkg_downloads"
        python setup_vcpkg.py
      shell: cmd
      env:
        VCPKG_DEFAULT_BINARY_CACHE: ${{ runner.temp }}\vcpkg_archives
        VCPKG_DOWNLOADS: ${{ runner.temp }}\vcpkg_downloads

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v3
      with:
        vs-version: '18'

    - name: Create foobar2000 components directory
      run: |
        $platforms = @('win32', 'x64')
        foreach ($platform in $platforms) {
          $targetDir = Join-Path -Path $env:GITHUB_WORKSPACE -ChildPath "..\foobar2000\$platform\foobar2000\components"
          New-Item -ItemType Directory -Force -Path $targetDir
        }
      shell: pwsh

    - name: Build
      working-directory: ${{env.SOLUTION_FILE_PATH}}
      run: python build.py --rebuild --verbose
      env:
        VCPKG_DEFAULT_BINARY_CACHE: ${{ runner.temp }}\vcpkg_archives
        VCPKG_DOWNLOADS: ${{ runner.temp }}\vcpkg_downloads

    - name: Upload fb2k-component artifact
      uses: actions/upload-artifact@v7
      with:
        name: foo_openhacks.fb2k-component
        path: ${{env.SOLUTION_FILE_PATH}}/foo_openhacks.fb2k-component
